name: olympic_platform

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: olympic_platform
      POSTGRES_USER: olympic_platform
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the environment}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olympic_platform -d olympic_platform"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - olympic_platform-internal

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - olympic_platform-internal

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    mem_limit: ${API_MEMORY_LIMIT:-2g}
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080

      DB_URL: jdbc:postgresql://postgres:5432/olympic_platform
      DB_USERNAME: olympic_platform
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the environment}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-5}
      DB_POOL_MIN_IDLE: ${DB_POOL_MIN_IDLE:-1}
      DB_CONNECTION_TIMEOUT: ${DB_CONNECTION_TIMEOUT:-30000}
      DB_IDLE_TIMEOUT: ${DB_IDLE_TIMEOUT:-600000}
      DB_MAX_LIFETIME: ${DB_MAX_LIFETIME:-1800000}

      REDIS_HOST: redis
      REDIS_PORT: 6379

      OLYMPIC_AUTH_REGISTRATION_MODE: ${OLYMPIC_AUTH_REGISTRATION_MODE:-ADMIN_ONLY}

      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in the environment}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in the environment}
      ENCRYPTION_SALT: ${ENCRYPTION_SALT:?Set ENCRYPTION_SALT in the environment}

      OLYMPIC_ADMIN_EMAIL: ${OLYMPIC_ADMIN_EMAIL:?Set OLYMPIC_ADMIN_EMAIL in the environment}
      OLYMPIC_ADMIN_USERNAME: ${OLYMPIC_ADMIN_USERNAME:?Set OLYMPIC_ADMIN_USERNAME in the environment}
      OLYMPIC_ADMIN_PASSWORD: ${OLYMPIC_ADMIN_PASSWORD:?Set OLYMPIC_ADMIN_PASSWORD in the environment}
      OLYMPIC_ADMIN_FULL_NAME: ${OLYMPIC_ADMIN_FULL_NAME:-Olympic Learning Platform Administrator}

      WEB_BASE_URL: ${WEB_BASE_URL:-http://127.0.0.1:3000}
      SERVER_BASE_URL: ${SERVER_BASE_URL:-http://127.0.0.1:8080}
      DEFAULT_AVATAR_URL: ${DEFAULT_AVATAR_URL:-https://ui-avatars.com/api/?name={name}&background=random&color=fff&size=128}

      SPRING_AI_MODEL_CHAT: ${SPRING_AI_MODEL_CHAT:-none}
      SPRING_AI_MODEL_EMBEDDING_TEXT: ${SPRING_AI_MODEL_EMBEDDING_TEXT:-none}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_MAX_TOKENS: ${GEMINI_MAX_TOKENS:-8192}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}

      OLYMPIC_MAIL_ENABLED: ${OLYMPIC_MAIL_ENABLED:-false}
      MAIL_HOST: ${MAIL_HOST:-localhost}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-false}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-false}
      MAIL_CONNECTION_TIMEOUT: ${MAIL_CONNECTION_TIMEOUT:-5000}
      MAIL_TIMEOUT: ${MAIL_TIMEOUT:-5000}
      MAIL_WRITE_TIMEOUT: ${MAIL_WRITE_TIMEOUT:-5000}
      MAIL_FROM: ${MAIL_FROM:-no-reply@localhost}

      OLYMPIC_EXPORT_STORAGE_ROOT: /app/storage/exports
    ports:
      - "127.0.0.1:${OLYMPIC_API_PORT:-8080}:8080"
    volumes:
      - api-storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - olympic_platform-internal
      - olympic_platform-egress

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    ports:
      - "127.0.0.1:${OLYMPIC_WEB_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - olympic_platform-internal
      - olympic_platform-egress

volumes:
  postgres-data:
  redis-data:
  api-storage:

networks:
  olympic_platform-internal:
    internal: true
  olympic_platform-egress:
    driver: bridge

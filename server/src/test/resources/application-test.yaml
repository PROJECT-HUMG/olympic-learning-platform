# ===================================================================
# Test profile — overrides for @WebMvcTest and integration tests
# ===================================================================

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.security.oauth2.client.autoconfigure.OAuth2ClientAutoConfiguration
      - org.springframework.ai.model.deepseek.autoconfigure.DeepSeekChatAutoConfiguration

  security:
    oauth2:
      client:
        registration: {}

olympic:
  client:
    base-url: http://localhost:3000
  security:
    jwt:
      secret-key: test-secret-key-with-at-least-32-bytes-long!!
      access-expiration: 15
      refresh-expiration: 10080
    cookie:
      secure: false
      same-site: Lax

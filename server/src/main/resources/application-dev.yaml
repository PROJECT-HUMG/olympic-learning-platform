# ===================================================================
# Development profile
# Activate: --spring.profiles.active=dev (default)
# ===================================================================

server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/olympic_humg_dev}
    username: ${DB_USERNAME:olympic_humg}
    password: ${DB_PASSWORD:olympic_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
    show-sql: true

  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
          temperature: 0
          max-tokens: ${DEEPSEEK_MAX_TOKENS:512}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/api/v1/login/oauth2/code/{registrationId}"
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope: read:user,user:email
            redirect-uri: "{baseUrl}/api/v1/login/oauth2/code/{registrationId}"

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    me.nghlong3004.olympic: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.security: DEBUG

olympic:
  client:
    base-url: ${WEB_BASE_URL:http://localhost:3000}
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:dev-secret-key-with-at-least-32-bytes-long}
      access-expiration: 15
      refresh-expiration: 10080
    cookie:
      secure: false
      same-site: Lax

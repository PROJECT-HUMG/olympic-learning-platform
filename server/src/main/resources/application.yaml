# ===================================================================
# Shared configuration for all profiles
# Profile-specific overrides: application-dev.yaml, application-prod.yaml
# ===================================================================

spring:
  application:
    name: olympic-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  mvc:
    problem-details:
      enabled: true

  threads:
    virtual:
      enabled: true

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_batch_fetch_size: 16

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  jackson:
    time-zone: Asia/Ho_Chi_Minh
    default-property-inclusion: non_null

server:
  servlet:
    context-path: /

# Actuator defaults (profiles may override)
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

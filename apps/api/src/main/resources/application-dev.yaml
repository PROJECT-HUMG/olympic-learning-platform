server:
  port: ${SERVER_PORT:8080}

spring:
  threads:
    virtual:
      enabled: true
  task:
    scheduling:
      thread-name-prefix: "olympic-scheduler-"
      shutdown:
        await-termination: true
        await-termination-period: 10s
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/olympic_dev}
    username: ${DB_USERNAME:olympic}
    password: ${DB_PASSWORD:olympic}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
    show-sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}
          connectiontimeout: ${MAIL_CONNECTION_TIMEOUT:5000}
          timeout: ${MAIL_TIMEOUT:5000}
          writetimeout: ${MAIL_WRITE_TIMEOUT:5000}

  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      chat:
        model: ${DEEPSEEK_MODEL:deepseek}
        temperature: 0
        max-tokens: ${DEEPSEEK_MAX_TOKENS:8192}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/api/v1/login/oauth2/code/{registrationId}"
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope: read:user,user:email
            redirect-uri: "{baseUrl}/api/v1/login/oauth2/code/{registrationId}"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    me.nghlong3004.olympic: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.telegram: INFO

olympic:
  user:
    default-avatar-url: ${DEFAULT_AVATAR_URL:https://ui-avatars.com/api/?name={name}&background=random&color=fff&size=128}
  mail:
    from: ${MAIL_FROM:no-reply@nghlong3004.me}
    enabled: ${OLYMPIC_MAIL_ENABLED:true}
  client:
    base-url: ${WEB_BASE_URL}
  security:
    access-expiration-minutes: 15
    refresh-expiration-minutes: 10080
    jwt:
      secret-key: ${JWT_SECRET_KEY:dev-only-change-me-dev-only-change-me}
    encryption-key: ${ENCRYPTION_KEY:generate}
    encryption-salt: ${ENCRYPTION_SALT:5c0744940b5c369b}
    cookie:
      secure: false
      same-site: lax
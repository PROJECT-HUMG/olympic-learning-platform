spring:
  application:
    name: olympic

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  mvc:
    problemdetails:
      enabled: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  ai:
    model:
      chat: ${SPRING_AI_MODEL_CHAT:none}
      embedding:
        text: ${SPRING_AI_MODEL_EMBEDDING_TEXT:none}

server:
  servlet:
    context-path: /

logging:
  pattern:
    level: "%5p [traceId=%X{traceId:-}]"

olympic:
  storage:
    provider: ${STORAGE_PROVIDER:cloudinary}
  auth:
    registration:
      mode: ${VFQC_AUTH_REGISTRATION_MODE:SELF_VERIFY}
    email-token:
      verification-expiration-minutes: ${VFQC_EMAIL_VERIFICATION_EXPIRATION_MINUTES:1440}
      password-reset-expiration-minutes: ${VFQC_PASSWORD_RESET_EXPIRATION_MINUTES:15}